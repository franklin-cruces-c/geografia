<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Interactivo de Europa</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin: 10px;
            color: #333;
        }

        #map {
            width: 100%;
            height: 650px;
        }

        .info-box {
            background: white;
            padding: 10px 12px;
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
            line-height: 1.4;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Mapa Político de Europa</h1>
    <div id="map"></div>

    <script>
        // =========================
        // 1) Crear mapa
        // =========================
        const map = L.map('map').setView([54.5, 15.0], 4);

        // Base SIN nombres
        // Leaflet muestra el uso de Carto "light_nolabels" para este tipo de mapas.
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // =========================
        // 2) Datos de capitales en español
        // =========================
        const paises = [
            { nombre: "Francia", capital: "París", lat: 48.8566, lon: 2.3522 },
            { nombre: "Alemania", capital: "Berlín", lat: 52.5200, lon: 13.4050 },
            { nombre: "Italia", capital: "Roma", lat: 41.9028, lon: 12.4964 },
            { nombre: "España", capital: "Madrid", lat: 40.4168, lon: -3.7038 },
            { nombre: "Reino Unido", capital: "Londres", lat: 51.5074, lon: -0.1278 },
            { nombre: "Polonia", capital: "Varsovia", lat: 52.2297, lon: 21.0122 },
            { nombre: "Países Bajos", capital: "Ámsterdam", lat: 52.3676, lon: 4.9041 },
            { nombre: "Bélgica", capital: "Bruselas", lat: 50.8503, lon: 4.3517 },
            { nombre: "Austria", capital: "Viena", lat: 48.2082, lon: 16.3738 },
            { nombre: "Suecia", capital: "Estocolmo", lat: 59.3293, lon: 18.0686 },
            { nombre: "Noruega", capital: "Oslo", lat: 59.9139, lon: 10.7522 },
            { nombre: "Dinamarca", capital: "Copenhague", lat: 55.6761, lon: 12.5683 },
            { nombre: "Finlandia", capital: "Helsinki", lat: 60.1695, lon: 24.9354 },
            { nombre: "Grecia", capital: "Atenas", lat: 37.9838, lon: 23.7275 },
            { nombre: "Portugal", capital: "Lisboa", lat: 38.7223, lon: -9.1393 },
            { nombre: "República Checa", capital: "Praga", lat: 50.0755, lon: 14.4378 },
            { nombre: "Hungría", capital: "Budapest", lat: 47.4979, lon: 19.0402 },
            { nombre: "Rumania", capital: "Bucarest", lat: 44.4268, lon: 26.1025 },
            { nombre: "Bulgaria", capital: "Sofía", lat: 42.6977, lon: 23.3219 },
            { nombre: "Croacia", capital: "Zagreb", lat: 45.8150, lon: 15.9819 }
        ];

        // Índice rápido país -> capital
        const capitalesPorPais = {};
        paises.forEach(p => {
            capitalesPorPais[p.nombre.toLowerCase()] = p.capital;
        });

        // =========================
        // 3) Marcadores rojos para capitales
        // =========================
        paises.forEach(function(pais) {
            const marcador = L.circleMarker([pais.lat, pais.lon], {
                radius: 6,
                color: '#b30000',
                fillColor: '#ff2d2d',
                fillOpacity: 0.9,
                weight: 1.5
            }).addTo(map);

            marcador.bindPopup(`
                <b>${pais.capital}</b><br>
                Capital de ${pais.nombre}
            `);
        });

        // =========================
        // 4) Caja informativa
        // =========================
        const infoBox = L.control({ position: 'topright' });

        infoBox.onAdd = function() {
            const div = L.DomUtil.create('div', 'info-box');
            div.innerHTML = `
                <b>Instrucciones</b><br>
                • Haz clic en un país para ver su nombre.<br>
                • Haz clic en un punto rojo para ver la capital.
            `;
            return div;
        };

        infoBox.addTo(map);

        // =========================
        // 5) Estilo de países
        // =========================
        function estiloPais() {
            return {
                color: '#333',       // borde más oscuro
                weight: 1.2,
                fillColor: '#dfe8f5', // relleno suave
                fillOpacity: 0.35
            };
        }

        function resaltarFeature(e) {
            const layer = e.target;
            layer.setStyle({
                weight: 2,
                color: '#111',
                fillColor: '#a8c4e6',
                fillOpacity: 0.55
            });
            layer.bringToFront();
        }

        function resetearResaltado(e) {
            geojsonLayer.resetStyle(e.target);
        }

        function nombrePaisEnEspanol(nombreOriginal) {
            const mapaNombres = {
                "France": "Francia",
                "Germany": "Alemania",
                "Italy": "Italia",
                "Spain": "España",
                "United Kingdom": "Reino Unido",
                "Poland": "Polonia",
                "Netherlands": "Países Bajos",
                "Belgium": "Bélgica",
                "Austria": "Austria",
                "Sweden": "Suecia",
                "Norway": "Noruega",
                "Denmark": "Dinamarca",
                "Finland": "Finlandia",
                "Greece": "Grecia",
                "Portugal": "Portugal",
                "Czech Republic": "República Checa",
                "Czechia": "República Checa",
                "Hungary": "Hungría",
                "Romania": "Rumania",
                "Bulgaria": "Bulgaria",
                "Croatia": "Croacia",
                "Ireland": "Irlanda",
                "Switzerland": "Suiza",
                "Serbia": "Serbia",
                "Bosnia and Herzegovina": "Bosnia y Herzegovina",
                "Slovakia": "Eslovaquia",
                "Slovenia": "Eslovenia",
                "Albania": "Albania",
                "North Macedonia": "Macedonia del Norte",
                "Montenegro": "Montenegro",
                "Moldova": "Moldavia",
                "Ukraine": "Ucrania",
                "Belarus": "Bielorrusia",
                "Lithuania": "Lituania",
                "Latvia": "Letonia",
                "Estonia": "Estonia",
                "Luxembourg": "Luxemburgo",
                "Iceland": "Islandia",
                "Turkey": "Turquía",
                "Kosovo": "Kosovo"
            };

            return mapaNombres[nombreOriginal] || nombreOriginal;
        }

        function onEachCountry(feature, layer) {
            const nombreOriginal =
                feature.properties.name ||
                feature.properties.ADMIN ||
                feature.properties.admin ||
                "País";

            const nombreEs = nombrePaisEnEspanol(nombreOriginal);

            layer.on({
                mouseover: resaltarFeature,
                mouseout: resetearResaltado,
                click: function() {
                    layer.bindPopup(`<b>País:</b> ${nombreEs}`).openPopup();
                }
            });
        }

        // =========================
        // 6) Cargar GeoJSON de Europa
        // =========================
        // Puedes cambiar esta URL por un archivo local si quieres más control.
        const geojsonURL = 'https://raw.githubusercontent.com/GeoGuess/GeoGuess-Maps/main/public/geojson/maps/regions/europe.geojson';

        let geojsonLayer;

        fetch(geojsonURL)
            .then(response => response.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    style: estiloPais,
                    onEachFeature: onEachCountry
                }).addTo(map);
            })
            .catch(error => {
                console.error('Error cargando GeoJSON:', error);
            });
    </script>
</body>
</html>
