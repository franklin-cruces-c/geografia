<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Interactivo de Europa</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin: 10px;
            color: #333;
        }

        #controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px;
        }

        #controls button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #2d6cdf;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        #controls button:hover {
            background: #1d56b3;
        }

        #map {
            width: 100%;
            height: 650px;
        }

        .info-box {
            background: white;
            padding: 10px 12px;
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
            line-height: 1.4;
        }

        .country-label {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 12px;
            font-weight: bold;
            color: #222;
            box-shadow: none;
            text-shadow: 1px 1px 2px white, 0 0 3px white;
            white-space: nowrap;
        }

        .capital-label {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 12px;
            font-weight: bold;
            color: #8a0000;
            box-shadow: none;
            text-shadow: 1px 1px 2px white, 0 0 3px white;
            white-space: nowrap;
        }

        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Mapa Político de Europa</h1>

    <div id="controls">
        <button id="btnReset">Reiniciar selección</button>
        <button id="btnPaises">Mostrar nombres de países</button>
        <button id="btnCapitales">Mostrar capitales</button>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([54.5, 15.0], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        map.createPane('capitalesPane');
        map.getPane('capitalesPane').style.zIndex = 650;

        map.createPane('labelsPane');
        map.getPane('labelsPane').style.zIndex = 700;

        const paises = [
            { nombre: "Francia", capital: "París", lat: 48.8566, lon: 2.3522 },
            { nombre: "Alemania", capital: "Berlín", lat: 52.5200, lon: 13.4050 },
            { nombre: "Italia", capital: "Roma", lat: 41.9028, lon: 12.4964 },
            { nombre: "España", capital: "Madrid", lat: 40.4168, lon: -3.7038 },
            { nombre: "Reino Unido", capital: "Londres", lat: 51.5074, lon: -0.1278 },
            { nombre: "Polonia", capital: "Varsovia", lat: 52.2297, lon: 21.0122 },
            { nombre: "Países Bajos", capital: "Ámsterdam", lat: 52.3676, lon: 4.9041 },
            { nombre: "Bélgica", capital: "Bruselas", lat: 50.8503, lon: 4.3517 },
            { nombre: "Austria", capital: "Viena", lat: 48.2082, lon: 16.3738 },
            { nombre: "Suecia", capital: "Estocolmo", lat: 59.3293, lon: 18.0686 },
            { nombre: "Noruega", capital: "Oslo", lat: 59.9139, lon: 10.7522 },
            { nombre: "Dinamarca", capital: "Copenhague", lat: 55.6761, lon: 12.5683 },
            { nombre: "Finlandia", capital: "Helsinki", lat: 60.1695, lon: 24.9354 },
            { nombre: "Grecia", capital: "Atenas", lat: 37.9838, lon: 23.7275 },
            { nombre: "Portugal", capital: "Lisboa", lat: 38.7223, lon: -9.1393 },
            { nombre: "República Checa", capital: "Praga", lat: 50.0755, lon: 14.4378 },
            { nombre: "Hungría", capital: "Budapest", lat: 47.4979, lon: 19.0402 },
            { nombre: "Rumania", capital: "Bucarest", lat: 44.4268, lon: 26.1025 },
            { nombre: "Bulgaria", capital: "Sofía", lat: 42.6977, lon: 23.3219 },
            { nombre: "Croacia", capital: "Zagreb", lat: 45.8150, lon: 15.9819 }
        ];

        const infoBox = L.control({ position: 'topright' });
        infoBox.onAdd = function() {
            const div = L.DomUtil.create('div', 'info-box');
            div.innerHTML = `
                <b>Instrucciones</b><br>
                • Pasa el mouse sobre un país para resaltarlo.<br>
                • Haz clic en un país para seleccionarlo o deseleccionarlo.<br>
                • Haz clic en un punto rojo para marcar una capital.<br>
                • Usa los botones para mostrar nombres o reiniciar.
            `;
            return div;
        };
        infoBox.addTo(map);

        function nombrePaisEnEspanol(nombreOriginal) {
            const mapaNombres = {
                "France": "Francia",
                "Germany": "Alemania",
                "Italy": "Italia",
                "Spain": "España",
                "United Kingdom": "Reino Unido",
                "Poland": "Polonia",
                "Netherlands": "Países Bajos",
                "Belgium": "Bélgica",
                "Austria": "Austria",
                "Sweden": "Suecia",
                "Norway": "Noruega",
                "Denmark": "Dinamarca",
                "Finland": "Finlandia",
                "Greece": "Grecia",
                "Portugal": "Portugal",
                "Czech Republic": "República Checa",
                "Czechia": "República Checa",
                "Hungary": "Hungría",
                "Romania": "Rumania",
                "Bulgaria": "Bulgaria",
                "Croatia": "Croacia",
                "Ireland": "Irlanda",
                "Switzerland": "Suiza",
                "Serbia": "Serbia",
                "Bosnia and Herzegovina": "Bosnia y Herzegovina",
                "Slovakia": "Eslovaquia",
                "Slovenia": "Eslovenia",
                "Albania": "Albania",
                "North Macedonia": "Macedonia del Norte",
                "Montenegro": "Montenegro",
                "Moldova": "Moldavia",
                "Ukraine": "Ucrania",
                "Belarus": "Bielorrusia",
                "Lithuania": "Lituania",
                "Latvia": "Letonia",
                "Estonia": "Estonia",
                "Luxembourg": "Luxemburgo",
                "Iceland": "Islandia",
                "Turkey": "Turquía",
                "Kosovo": "Kosovo"
            };

            return mapaNombres[nombreOriginal] || nombreOriginal;
        }

        function estiloNormalPais() {
            return {
                color: '#4a4a4a',
                weight: 1.2,
                fillColor: '#f2f5f9',
                fillOpacity: 0.45
            };
        }

        function estiloHoverPais() {
            return {
                color: '#1f1f1f',
                weight: 2,
                fillColor: '#8ec5ff',
                fillOpacity: 0.75
            };
        }

        function estiloSeleccionadoPais() {
            return {
                color: '#0d3b66',
                weight: 2.5,
                fillColor: '#4dabf7',
                fillOpacity: 0.85
            };
        }

        function estiloNormalCapital() {
            return {
                pane: 'capitalesPane',
                radius: 6,
                color: '#990000',
                fillColor: '#ff2d2d',
                fillOpacity: 0.95,
                weight: 1.5
            };
        }

        function estiloHoverCapital() {
            return {
                pane: 'capitalesPane',
                radius: 7,
                color: '#7a3d00',
                fillColor: '#ffb347',
                fillOpacity: 1,
                weight: 2
            };
        }

        function estiloSeleccionadaCapital() {
            return {
                pane: 'capitalesPane',
                radius: 7,
                color: '#0b5d1e',
                fillColor: '#2ecc71',
                fillOpacity: 1,
                weight: 2
            };
        }

        const countryLayers = [];
        const capitalMarkers = [];
        const countryLabels = [];
        const capitalLabels = [];

        let mostrarNombresPaises = false;
        let mostrarNombresCapitales = false;

        paises.forEach(function(pais) {
            const marcador = L.circleMarker([pais.lat, pais.lon], estiloNormalCapital()).addTo(map);

            marcador.capitalSeleccionada = false;
            marcador.datosPais = pais;

            marcador.bindPopup(`
                <b>${pais.capital}</b><br>
                Capital de ${pais.nombre}
            `);

            marcador.on('mouseover', function() {
                if (!this.capitalSeleccionada) {
                    this.setStyle(estiloHoverCapital());
                }
            });

            marcador.on('mouseout', function() {
                if (!this.capitalSeleccionada) {
                    this.setStyle(estiloNormalCapital());
                }
            });

            marcador.on('click', function(e) {
                L.DomEvent.stopPropagation(e);

                this.capitalSeleccionada = !this.capitalSeleccionada;

                if (this.capitalSeleccionada) {
                    this.setStyle(estiloSeleccionadaCapital());
                } else {
                    this.setStyle(estiloNormalCapital());
                }

                this.openPopup();
            });

            capitalMarkers.push(marcador);

            const capitalLabel = L.marker([pais.lat, pais.lon], {
                pane: 'labelsPane',
                interactive: false,
                icon: L.divIcon({
                    className: 'capital-label',
                    html: pais.capital,
                    iconSize: null
                })
            });

            capitalLabels.push(capitalLabel);
        });

        function onEachCountry(feature, layer) {
            const nombreOriginal =
                feature.properties.name ||
                feature.properties.ADMIN ||
                feature.properties.admin ||
                "País";

            const nombreEs = nombrePaisEnEspanol(nombreOriginal);

            layer.nombreEs = nombreEs;
            layer.seleccionado = false;

            layer.setStyle(estiloNormalPais());

            layer.on('mouseover', function() {
                if (!layer.seleccionado) {
                    layer.setStyle(estiloHoverPais());
                }
            });

            layer.on('mouseout', function() {
                if (!layer.seleccionado) {
                    layer.setStyle(estiloNormalPais());
                }
            });

            layer.on('click', function(e) {
                L.DomEvent.stopPropagation(e);

                layer.seleccionado = !layer.seleccionado;

                if (layer.seleccionado) {
                    layer.setStyle(estiloSeleccionadoPais());
                } else {
                    layer.setStyle(estiloNormalPais());
                }

                layer.bindPopup(`<b>País:</b> ${nombreEs}`).openPopup();
            });

            countryLayers.push(layer);

            const centro = layer.getBounds().getCenter();

            const label = L.marker(centro, {
                pane: 'labelsPane',
                interactive: false,
                icon: L.divIcon({
                    className: 'country-label',
                    html: nombreEs,
                    iconSize: null
                })
            });

            countryLabels.push(label);
        }

        const geojsonURL = 'https://raw.githubusercontent.com/GeoGuess/GeoGuess-Maps/main/public/geojson/maps/regions/europe.geojson';

        fetch(geojsonURL)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: estiloNormalPais,
                    onEachFeature: onEachCountry
                }).addTo(map);
            })
            .catch(error => {
                console.error('Error cargando GeoJSON:', error);
            });

        function resetearTodo() {
            countryLayers.forEach(layer => {
                layer.seleccionado = false;
                layer.setStyle(estiloNormalPais());
                layer.closePopup();
            });

            capitalMarkers.forEach(marker => {
                marker.capitalSeleccionada = false;
                marker.setStyle(estiloNormalCapital());
                marker.closePopup();
            });
        }

        function toggleCountryLabels() {
            mostrarNombresPaises = !mostrarNombresPaises;

            countryLabels.forEach(label => {
                if (mostrarNombresPaises) {
                    label.addTo(map);
                } else if (map.hasLayer(label)) {
                    map.removeLayer(label);
                }
            });

            document.getElementById('btnPaises').textContent =
                mostrarNombresPaises ? 'Ocultar nombres de países' : 'Mostrar nombres de países';
        }

        function toggleCapitalLabels() {
            mostrarNombresCapitales = !mostrarNombresCapitales;

            capitalLabels.forEach(label => {
                if (mostrarNombresCapitales) {
                    label.addTo(map);
                } else if (map.hasLayer(label)) {
                    map.removeLayer(label);
                }
            });

            document.getElementById('btnCapitales').textContent =
                mostrarNombresCapitales ? 'Ocultar capitales' : 'Mostrar capitales';
        }

        document.getElementById('btnReset').addEventListener('click', resetearTodo);
        document.getElementById('btnPaises').addEventListener('click', toggleCountryLabels);
        document.getElementById('btnCapitales').addEventListener('click', toggleCapitalLabels);
    </script>
</body>
</html>
