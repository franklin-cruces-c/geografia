<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map of Europe</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #map { width: 100%; height: 600px; }
        .marker { 
            background-color: red;
            border-radius: 50%;
            width: 10px;
            height: 10px;
            position: absolute;
            transform: translate(-50%, -50%);
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
</head>
<body>
    <h1>Interactive Map of Europe</h1>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([48.8566, 2.3522], 4);  // Centered on Europe

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Countries and capitals data
        var locations = [
            { name: "France", capital: "Paris", lat: 48.8566, lon: 2.3522 },
            { name: "Germany", capital: "Berlin", lat: 52.5200, lon: 13.4050 },
            { name: "Italy", capital: "Rome", lat: 41.9028, lon: 12.4964 },
            { name: "Spain", capital: "Madrid", lat: 40.4168, lon: -3.7038 },
            { name: "United Kingdom", capital: "London", lat: 51.5074, lon: -0.1278 },
            { name: "Poland", capital: "Warsaw", lat: 52.2297, lon: 21.0122 },
            { name: "Netherlands", capital: "Amsterdam", lat: 52.3676, lon: 4.9041 },
            { name: "Belgium", capital: "Brussels", lat: 50.8503, lon: 4.3517 },
            { name: "Austria", capital: "Vienna", lat: 48.2082, lon: 16.3738 },
            { name: "Sweden", capital: "Stockholm", lat: 59.3293, lon: 18.0686 },
            //... Add other countries and capitals as needed
        ];

        // Add markers for each country and capital
        locations.forEach(function(location) {
            var marker = L.circleMarker([location.lat, location.lon], { radius: 10, color: 'red' }).addTo(map);
            marker.bindPopup('<b>' + location.name + '</b><br>Capital: ' + location.capital);
            marker.on('click', function() {
                alert(location.name);
            });
        });
    </script>
</body>
</html>
