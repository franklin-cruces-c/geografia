<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map of Europe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 600px; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Create a map centered on Europe
        var map = L.map('map').setView([54.5260, 15.2551], 4);

        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Define country boundaries (not exhaustive)
        const europeCountries = {
            "Germany": [51.1657, 10.4515],
            "France": [46.6034, 1.8883],
            "Spain": [40.4637, -3.7492],
            "Italy": [41.8719, 12.5674],
            "United Kingdom": [55.3781, -3.4360],
            "Netherlands": [52.1326, 5.2913],
            "Sweden": [60.1282, 18.6435],
            "Norway": [60.4720, 8.4689],
            "Finland": [61.9241, 25.7482],
            "Denmark": [56.2639, 9.5018],
            // Add more countries as needed
        };

        // Add markers for each country
        for (const [country, coords] of Object.entries(europeCountries)) {
            L.marker(coords).addTo(map)
                .bindPopup(country)
                .on('click', function () {
                    alert('You clicked on ' + country);
                });
        }
    </script>
</body>
</html>
