<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Interactivo Europa</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script src="diccionario-paises.js"></script>
<script src="diccionario-excepciones.js"></script>

<style>
#map { height: 100vh; }
.country-label { font-weight:bold; font-size:12px; background:none; border:none; }
.capital-label { font-weight:bold; font-size:12px; color:red; background:none; border:none; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([54, 15], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

let worldData;
let countryInfoMap = new Map();

const WORLD_URL = "https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json";
const INFO_URL = "https://restcountries.com/v3.1/all?fields=name,flags,population,languages,currencies,capital";

function calcularAreaKm2(layer){
    try{
        return Math.round(turf.area(layer.toGeoJSON())/1000000);
    }catch(e){return null;}
}

function crearPopup(nombre, layer){
    const area = calcularAreaKm2(layer);
    return `<b>${nombre}</b><br>Área: ${area} km²`;
}

function render(){
    L.geoJSON(worldData,{
        onEachFeature:(f,l)=>{
            const nombre = f.properties.name;

            l.on('click',e=>{
                const centro = l.getBounds().getCenter();
                L.popup().setLatLng(centro)
                .setContent(crearPopup(nombre,l))
                .openOn(map);
            });

            l.on('mouseover',()=>{
                l.setStyle({color:"black",weight:2,fillColor:"#4dabf7"});
            });

            l.on('mouseout',()=>{
                l.setStyle({color:"#555",weight:1,fillColor:"#ccc"});
            });

        },
        style:{color:"#555",weight:1,fillColor:"#ccc",fillOpacity:0.5}
    }).addTo(map);
}

Promise.all([
 fetch(WORLD_URL).then(r=>r.json()).then(d=>worldData=d),
 fetch(INFO_URL)
]).then(()=>render());
</script>

</body>
</html>
