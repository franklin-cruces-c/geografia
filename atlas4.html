<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Interactivo de Europa</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script src="diccionario-paises.js"></script>
    <script src="diccionario-excepciones.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        h1 { margin: 10px; color: #333; }
        #controls {
            display: flex; gap: 10px; flex-wrap: wrap; margin: 10px; align-items: center;
        }
        #controls button, #controls select {
            padding: 10px 14px; border-radius: 6px; font-size: 14px;
        }
        #controls button {
            border: none; background: #2d6cdf; color: white; cursor: pointer;
        }
        #controls button:hover { background: #1d56b3; }
        #controls select { border: 1px solid #ccc; background: white; }
        #map { width: 100%; height: 650px; }
        .info-box {
            background: white; padding: 10px 12px; border-radius: 6px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2); line-height: 1.4;
        }
        .country-label, .capital-label {
            background: transparent; border: none; padding: 0; font-size: 12px;
            font-weight: bold; text-shadow: 1px 1px 2px white, 0 0 3px white;
            white-space: nowrap;
        }
        .country-label { color: #111; }
        .capital-label { color: #8a0000; }
        .leaflet-div-icon { background: transparent !important; border: none !important; }
        .leaflet-popup-content { font-size: 14px; }
        .popup-pais { min-width: 220px; }
        .popup-titulo { font-size: 16px; font-weight: bold; margin-bottom: 6px; color: #111; }
        .popup-bandera-wrap { margin: 6px 0 10px 0; }
        .popup-bandera {
            width: 64px; height: auto; border: 1px solid #ccc; border-radius: 6px;
            display: block; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .popup-linea { margin: 4px 0; line-height: 1.35; }
        .popup-capital { color: #b30000; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Mapa Político de Europa</h1>

    <div id="controls">
        <button id="btnReset">Reiniciar selección</button>
        <button id="btnPaises">Mostrar nombres de países</button>
        <button id="btnCapitales">Mostrar capitales</button>

        <select id="selectorModo">
            <option value="paises" selected>Solo países soberanos</option>
            <option value="excepciones">Territorios / excepciones</option>
        </select>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([54.5, 15.0], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        map.createPane('capitalesPane');
        map.getPane('capitalesPane').style.zIndex = 650;

        map.createPane('labelsPane');
        map.getPane('labelsPane').style.zIndex = 700;

        let worldData = null;
        let countryInfoMap = new Map();
        let geojsonLayer = null;
        let assistLayer = null;
        let countryLayers = [];
        let capitalMarkers = [];
        let countryLabels = [];
        let capitalLabels = [];
        let mostrarNombresPaises = false;
        let mostrarNombresCapitales = false;
        let modoActual = 'paises';

        const WORLD_GEOJSON_URL = 'https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json';
        const COUNTRY_INFO_URL = 'https://restcountries.com/v3.1/all?fields=name,flags,population,languages,currencies,capital';

        const TRADUCCIONES = {
            "France":"Francia","Germany":"Alemania","Italy":"Italia","Spain":"España","United Kingdom":"Reino Unido",
            "Poland":"Polonia","Netherlands":"Países Bajos","Belgium":"Bélgica","Austria":"Austria","Sweden":"Suecia",
            "Norway":"Noruega","Denmark":"Dinamarca","Finland":"Finlandia","Greece":"Grecia","Portugal":"Portugal",
            "Czech Republic":"República Checa","Czechia":"República Checa","Hungary":"Hungría","Romania":"Rumania",
            "Bulgaria":"Bulgaria","Croatia":"Croacia","Ireland":"Irlanda","Switzerland":"Suiza","Serbia":"Serbia",
            "Bosnia and Herzegovina":"Bosnia y Herzegovina","Slovakia":"Eslovaquia","Slovenia":"Eslovenia","Albania":"Albania",
            "North Macedonia":"Macedonia del Norte","Montenegro":"Montenegro","Moldova":"Moldavia","Ukraine":"Ucrania",
            "Belarus":"Bielorrusia","Lithuania":"Lituania","Latvia":"Letonia","Estonia":"Estonia","Luxembourg":"Luxemburgo",
            "Iceland":"Islandia","Turkey":"Turquía","Türkiye":"Turquía","Kosovo":"Kosovo","Andorra":"Andorra","Monaco":"Mónaco",
            "San Marino":"San Marino","Liechtenstein":"Liechtenstein","Malta":"Malta","Cyprus":"Chipre",
            "Holy See":"Ciudad del Vaticano","Vatican":"Ciudad del Vaticano","Vatican City":"Ciudad del Vaticano",
            "Vatican City State":"Ciudad del Vaticano","Åland":"Åland","Aland":"Åland","Faroe Islands":"Islas Feroe",
            "Gibraltar":"Gibraltar","Jersey":"Jersey","Guernsey":"Guernsey","Isle of Man":"Isla de Man",
            "Svalbard":"Svalbard","Svalbard and Jan Mayen":"Svalbard","Abkhazia":"Abjasia",
            "South Ossetia":"Osetia del Sur","Transnistria":"Transnistria","Artsakh":"Artsaj","Nagorno-Karabakh":"Artsaj"
        };

        const CENTROS_LABELS = {
            "Francia":[46.5,2.2],"Alemania":[51.1,10.4],"Italia":[42.8,12.8],"España":[40.2,-3.5],"Reino Unido":[54.5,-2.8],
            "Polonia":[52.1,19.4],"Países Bajos":[52.3,5.4],"Bélgica":[50.8,4.5],"Austria":[47.7,13.3],"Suecia":[62.0,16.5],
            "Noruega":[63.5,10.5],"Dinamarca":[56.1,10.0],"Finlandia":[63.7,26.0],"Grecia":[39.2,22.8],"Portugal":[39.6,-8.1],
            "República Checa":[49.8,15.3],"Hungría":[47.2,19.3],"Rumania":[45.8,24.9],"Bulgaria":[42.7,25.3],"Croacia":[45.2,16.4],
            "Irlanda":[53.3,-8.0],"Suiza":[46.8,8.2],"Serbia":[44.15,20.82],"Bosnia y Herzegovina":[44.2,17.8],
            "Eslovaquia":[48.7,19.6],"Eslovenia":[46.2,14.9],"Albania":[41.1,20.0],"Macedonia del Norte":[41.6,21.7],
            "Montenegro":[42.8,19.3],"Moldavia":[47.2,28.5],"Ucrania":[49.0,31.2],"Bielorrusia":[53.5,27.8],
            "Lituania":[55.2,23.9],"Letonia":[56.9,24.6],"Estonia":[58.7,25.0],"Luxemburgo":[49.8,6.1],"Islandia":[64.9,-18.6],
            "Turquía":[39.0,35.0],"Kosovo":[42.7,20.9],"Andorra":[42.55,1.57],"Mónaco":[43.74,7.42],"San Marino":[43.94,12.46],
            "Ciudad del Vaticano":[41.9022,12.4539],"Liechtenstein":[47.15,9.55],"Malta":[35.94,14.38],"Chipre":[35.10,33.25],
            "Åland":[60.18,19.9],"Islas Feroe":[62.05,-6.9],"Gibraltar":[36.14,-5.35],"Jersey":[49.21,-2.13],
            "Guernsey":[49.46,-2.58],"Isla de Man":[54.23,-4.55],"Svalbard":[78.5,17.0],"Abjasia":[43.0,41.0],
            "Osetia del Sur":[42.2,43.95],"Transnistria":[47.0,29.2],"Artsaj":[39.9,46.8]
        };

        const MICRO_CLICK_HELPERS = {
            "Macedonia del Norte": { lat: 41.61, lon: 21.72, radius: 14 },
            "Serbia": { lat: 44.15, lon: 20.82, radius: 14 },
            "Kosovo": { lat: 42.67, lon: 21.10, radius: 12 },
            "Ciudad del Vaticano": { lat: 41.9022, lon: 12.4539, radius: 12 },
            "Mónaco": { lat: 43.7384, lon: 7.4246, radius: 12 },
            "San Marino": { lat: 43.9424, lon: 12.4578, radius: 12 },
            "Liechtenstein": { lat: 47.1410, lon: 9.5209, radius: 12 },
            "Malta": { lat: 35.8989, lon: 14.5146, radius: 12 },
            "Andorra": { lat: 42.5063, lon: 1.5218, radius: 12 }
        };

        const TRADUCCION_IDIOMAS = {
            "Spanish":"Español","English":"Inglés","French":"Francés","German":"Alemán","Italian":"Italiano",
            "Portuguese":"Portugués","Dutch":"Neerlandés","Greek":"Griego","Polish":"Polaco","Romanian":"Rumano",
            "Bulgarian":"Búlgaro","Czech":"Checo","Slovak":"Eslovaco","Slovene":"Esloveno","Hungarian":"Húngaro",
            "Swedish":"Sueco","Danish":"Danés","Finnish":"Finés","Norwegian":"Noruego","Icelandic":"Islandés",
            "Irish":"Irlandés","Maltese":"Maltés","Latvian":"Letón","Lithuanian":"Lituano","Estonian":"Estonio",
            "Albanian":"Albanés","Serbian":"Serbio","Croatian":"Croata","Bosnian":"Bosnio","Montenegrin":"Montenegrino",
            "Macedonian":"Macedonio","Turkish":"Turco","Russian":"Ruso","Ukrainian":"Ucraniano","Belarusian":"Bielorruso",
            "Arabic":"Árabe","Hebrew":"Hebreo","Luxembourgish":"Luxemburgués","Catalan":"Catalán","Basque":"Euskera",
            "Galician":"Gallego","Welsh":"Galés","Scottish Gaelic":"Gaélico escocés","Manx":"Manés","Cornish":"Córnico",
            "Breton":"Bretón","Sami":"Sami","Northern Sami":"Sami septentrional","Faroese":"Feroés","Moldovan":"Moldavo",
            "Azerbaijani":"Azerí","Armenian":"Armenio","Georgian":"Georgiano","Kazakh":"Kazajo","Uzbek":"Uzbeko",
            "Kyrgyz":"Kirguís","Tajik":"Tayiko","Turkmen":"Turcomano","Persian":"Persa"
        };

        function nombrePaisEnEspanol(nombreOriginal) {
            return TRADUCCIONES[nombreOriginal] || nombreOriginal;
        }

        function obtenerPosicionLabel(nombreEs, diccionarioActivo, layer) {
            if (CENTROS_LABELS[nombreEs]) return CENTROS_LABELS[nombreEs];
            const info = diccionarioActivo[nombreEs];
            if (info) return [info.lat, info.lon];
            const centro = layer.getBounds().getCenter();
            return [centro.lat, centro.lng];
        }

        function estiloNormalPais() {
            return { color: '#3f3f3f', weight: 1.4, fillColor: '#eef2f6', fillOpacity: 0.55 };
        }

        function estiloHoverPais() {
            return { color: '#111111', weight: 2.2, fillColor: '#8ec5ff', fillOpacity: 0.78 };
        }

        function estiloSeleccionadoPais() {
            return { color: '#000000', weight: 2.8, fillColor: '#4dabf7', fillOpacity: 0.88 };
        }

        function estiloNormalCapital() {
            return { pane: 'capitalesPane', radius: 6, color: '#990000', fillColor: '#ff2d2d', fillOpacity: 0.95, weight: 1.5 };
        }

        function estiloHoverCapital() {
            return { pane: 'capitalesPane', radius: 7, color: '#7a3d00', fillColor: '#ffb347', fillOpacity: 1, weight: 2 };
        }

        function estiloSeleccionadaCapital() {
            return { pane: 'capitalesPane', radius: 7, color: '#0b5d1e', fillColor: '#2ecc71', fillOpacity: 1, weight: 2 };
        }

        function formatearPoblacion(numero) {
            if (typeof numero !== 'number') return 'No disponible';
            return numero.toLocaleString('es-ES');
        }

        function obtenerIdiomasTexto(languagesObj) {
            if (!languagesObj || typeof languagesObj !== 'object') return 'No disponible';
            const idiomas = Object.values(languagesObj).map(lang => TRADUCCION_IDIOMAS[lang] || lang).filter(Boolean);
            return idiomas.length ? idiomas.join(', ') : 'No disponible';
        }

        function obtenerMonedaTexto(currenciesObj) {
            if (!currenciesObj || typeof currenciesObj !== 'object') return 'No disponible';
            const monedas = Object.values(currenciesObj).map(moneda => {
                const nombre = moneda?.name || '';
                const simbolo = moneda?.symbol || '';
                if (nombre && simbolo) return `${nombre} (${simbolo})`;
                if (nombre) return nombre;
                return simbolo || '';
            }).filter(Boolean);
            return monedas.length ? monedas.join(', ') : 'No disponible';
        }

        function obtenerCapitalTexto(capitalArray) {
            if (!capitalArray) return 'No disponible';
            if (Array.isArray(capitalArray) && capitalArray.length) return capitalArray.join(', ');
            return 'No disponible';
        }

        function registrarAliasCountryInfo(alias, info) {
            if (!alias) return;
            countryInfoMap.set(alias, info);
        }

        function construirMapaCountryInfo(data) {
            countryInfoMap.clear();
            data.forEach(country => {
                const info = {
                    nombreComun: country?.name?.common || '',
                    nombreOficial: country?.name?.official || '',
                    bandera: country?.flags?.svg || country?.flags?.png || '',
                    poblacion: country?.population ?? null,
                    idiomas: country?.languages || {},
                    monedas: country?.currencies || {},
                    capital: country?.capital || []
                };

                registrarAliasCountryInfo(country?.name?.common, info);
                registrarAliasCountryInfo(country?.name?.official, info);

                const alias = [
                    ['Czechia', 'República Checa'], ['Czech Republic', 'República Checa'],
                    ['Bosnia and Herzegovina', 'Bosnia y Herzegovina'], ['North Macedonia', 'Macedonia del Norte'],
                    ['Moldova', 'Moldavia'], ['Republic of Moldova', 'Moldavia'],
                    ['Turkey', 'Turquía'], ['Türkiye', 'Turquía'],
                    ['Vatican City', 'Ciudad del Vaticano'], ['Holy See', 'Ciudad del Vaticano'],
                    ['Netherlands', 'Países Bajos'], ['United Kingdom', 'Reino Unido'],
                    ['Belarus', 'Bielorrusia'], ['Cyprus', 'Chipre']
                ];

                alias.forEach(([apiName, localName]) => {
                    if (country?.name?.common === apiName || country?.name?.official === apiName) {
                        registrarAliasCountryInfo(localName, info);
                    }
                });

                registrarAliasCountryInfo(nombrePaisEnEspanol(country?.name?.common || ''), info);
                registrarAliasCountryInfo(nombrePaisEnEspanol(country?.name?.official || ''), info);
            });
        }

        function obtenerInfoPais(nombreEs) {
            return countryInfoMap.get(nombreEs) || null;
        }

        function calcularAreaKm2(layer) {
            try {
                const geo = layer.toGeoJSON();
                return Math.round(turf.area(geo) / 1000000);
            } catch (e) {
                return null;
            }
        }

        function crearContenidoPopupPais(nombreEs, layer = null) {
            const info = obtenerInfoPais(nombreEs);
            const area = layer ? calcularAreaKm2(layer) : null;

            if (!info) {
                return `
                    <div class="popup-pais">
                        <div class="popup-titulo">${nombreEs}</div>
                        <div class="popup-linea">No hay datos adicionales disponibles</div>
                        <div class="popup-linea"><b>Área:</b> ${area ? area.toLocaleString('es-ES') + ' km²' : 'No disponible'}</div>
                    </div>
                `;
            }

            const banderaHtml = info.bandera ? `
                <div class="popup-bandera-wrap">
                    <img src="${info.bandera}" alt="Bandera de ${nombreEs}" class="popup-bandera">
                </div>
            ` : '';

            return `
                <div class="popup-pais">
                    <div class="popup-titulo">${nombreEs}</div>
                    ${banderaHtml}
                    <div class="popup-linea"><b>Capital:</b> <span class="popup-capital">${obtenerCapitalTexto(info.capital)}</span></div>
                    <div class="popup-linea"><b>Idiomas oficiales:</b> ${obtenerIdiomasTexto(info.idiomas)}</div>
                    <div class="popup-linea"><b>Población:</b> ${formatearPoblacion(info.poblacion)}</div>
                    <div class="popup-linea"><b>Moneda:</b> ${obtenerMonedaTexto(info.monedas)}</div>
                    <div class="popup-linea"><b>Área:</b> ${area ? area.toLocaleString('es-ES') + ' km²' : 'No disponible'}</div>
                </div>
            `;
        }

        const infoBox = L.control({ position: 'topright' });
        infoBox.onAdd = function() {
            const div = L.DomUtil.create('div', 'info-box');
            div.innerHTML = `
                <b>Instrucciones</b><br>
                • Pasa el mouse sobre un país para resaltarlo.<br>
                • Haz clic en un país para ver datos.<br>
                • Haz clic en un punto rojo para marcar una capital.<br>
                • Usa el selector para cambiar entre países y excepciones.
            `;
            return div;
        };
        infoBox.addTo(map);

        function limpiarCapasDinamicas() {
            if (geojsonLayer) { map.removeLayer(geojsonLayer); geojsonLayer = null; }
            if (assistLayer) { map.removeLayer(assistLayer); assistLayer = null; }

            capitalMarkers.forEach(marker => { if (map.hasLayer(marker)) map.removeLayer(marker); });
            countryLabels.forEach(label => { if (map.hasLayer(label)) map.removeLayer(label); });
            capitalLabels.forEach(label => { if (map.hasLayer(label)) map.removeLayer(label); });
            countryLayers = [];
            capitalMarkers = [];
            countryLabels = [];
            capitalLabels = [];
        }

        function obtenerDiccionarioActivo() {
            return modoActual === 'excepciones' ? window.DICCIONARIO_EXCEPCIONES : window.DICCIONARIO_PAISES;
        }

        function agregarCapitales(diccionarioActivo) {
            Object.entries(diccionarioActivo).forEach(([nombrePais, info]) => {
                const marcador = L.circleMarker([info.lat, info.lon], estiloNormalCapital()).addTo(map);
                marcador.capitalSeleccionada = false;

                marcador.bindPopup(`<b>${info.capital}</b><br>${nombrePais}`, { autoPan: false });

                marcador.on('mouseover', function() {
                    if (!this.capitalSeleccionada) this.setStyle(estiloHoverCapital());
                });

                marcador.on('mouseout', function() {
                    if (!this.capitalSeleccionada) this.setStyle(estiloNormalCapital());
                });

                marcador.on('click', function(e) {
                    if (e.originalEvent) L.DomEvent.stop(e.originalEvent);
                    this.capitalSeleccionada = !this.capitalSeleccionada;
                    this.setStyle(this.capitalSeleccionada ? estiloSeleccionadaCapital() : estiloNormalCapital());
                    this.openPopup();
                });

                capitalMarkers.push(marcador);

                const capitalLabel = L.marker([info.lat, info.lon], {
                    pane: 'labelsPane',
                    interactive: false,
                    icon: L.divIcon({ className: 'capital-label', html: info.capital, iconSize: null })
                });

                capitalLabels.push(capitalLabel);
                if (mostrarNombresCapitales) capitalLabel.addTo(map);
            });
        }

        function registrarPaisLayer(nombreEs, layer, diccionarioActivo) {
            layer.nombreEs = nombreEs;
            layer.seleccionado = false;
            layer.setStyle(estiloNormalPais());

            layer.on('mouseover', function() {
                if (!layer.seleccionado) layer.setStyle(estiloHoverPais());
                layer.bindTooltip(nombreEs, {
                    permanent: false,
                    direction: 'center',
                    className: 'country-label'
                }).openTooltip();
            });

            layer.on('mouseout', function() {
                if (!layer.seleccionado) layer.setStyle(estiloNormalPais());
            });

            layer.on('click', function(e) {
                if (e.originalEvent) L.DomEvent.stop(e.originalEvent);

                const centro = obtenerPosicionLabel(nombreEs, diccionarioActivo, layer);
                layer.seleccionado = !layer.seleccionado;
                layer.setStyle(layer.seleccionado ? estiloSeleccionadoPais() : estiloNormalPais());
                if (layer.seleccionado && layer.bringToFront) layer.bringToFront();

                L.popup({ autoPan: false, closeButton: true, maxWidth: 260 })
                    .setLatLng(centro)
                    .setContent(crearContenidoPopupPais(nombreEs, layer))
                    .openOn(map);
            });

            countryLayers.push(layer);

            const posicionLabel = obtenerPosicionLabel(nombreEs, diccionarioActivo, layer);
            const label = L.marker(posicionLabel, {
                pane: 'labelsPane',
                interactive: false,
                icon: L.divIcon({ className: 'country-label', html: nombreEs, iconSize: null })
            });

            countryLabels.push(label);
            if (mostrarNombresPaises) label.addTo(map);
        }

        function renderMapa() {
            limpiarCapasDinamicas();

            const diccionarioActivo = obtenerDiccionarioActivo();
            const nombresValidos = new Set(Object.keys(diccionarioActivo));

            agregarCapitales(diccionarioActivo);

            if (!worldData) return;

            geojsonLayer = L.geoJSON(worldData, {
                filter: function(feature) {
                    const nombreOriginal = (feature.properties && feature.properties.name) ? feature.properties.name : "";
                    const nombreEs = nombrePaisEnEspanol(nombreOriginal);
                    return nombresValidos.has(nombreEs);
                },
                style: estiloNormalPais,
                onEachFeature: function(feature, layer) {
                    const nombreOriginal = (feature.properties && feature.properties.name) ? feature.properties.name : "";
                    const nombreEs = nombrePaisEnEspanol(nombreOriginal);
                    if (!nombreEs || !nombresValidos.has(nombreEs)) return;
                    registrarPaisLayer(nombreEs, layer, diccionarioActivo);
                }
            }).addTo(map);

        }

        function cargarMundoUnaSolaVez() {
            return fetch(WORLD_GEOJSON_URL)
                .then(response => response.json())
                .then(data => { worldData = data; })
                .catch(error => { console.error('Error cargando GeoJSON mundial:', error); });
        }

        function cargarInfoPaisesUnaSolaVez() {
            return fetch(COUNTRY_INFO_URL)
                .then(response => response.json())
                .then(data => { construirMapaCountryInfo(data); })
                .catch(error => { console.error('Error cargando información de países:', error); });
        }

        function resetearTodo() {
            countryLayers.forEach(layer => {
                layer.seleccionado = false;
                layer.setStyle(estiloNormalPais());
            });

            capitalMarkers.forEach(marker => {
                marker.capitalSeleccionada = false;
                marker.setStyle(estiloNormalCapital());
                marker.closePopup();
            });

            map.closePopup();
        }

        function toggleCountryLabels() {
            mostrarNombresPaises = !mostrarNombresPaises;
            countryLabels.forEach(label => {
                if (mostrarNombresPaises) label.addTo(map);
                else if (map.hasLayer(label)) map.removeLayer(label);
            });
            document.getElementById('btnPaises').textContent =
                mostrarNombresPaises ? 'Ocultar nombres de países' : 'Mostrar nombres de países';
        }

        function toggleCapitalLabels() {
            mostrarNombresCapitales = !mostrarNombresCapitales;
            capitalLabels.forEach(label => {
                if (mostrarNombresCapitales) label.addTo(map);
                else if (map.hasLayer(label)) map.removeLayer(label);
            });
            document.getElementById('btnCapitales').textContent =
                mostrarNombresCapitales ? 'Ocultar capitales' : 'Mostrar capitales';
        }

        document.getElementById('btnReset').addEventListener('click', resetearTodo);
        document.getElementById('btnPaises').addEventListener('click', toggleCountryLabels);
        document.getElementById('btnCapitales').addEventListener('click', toggleCapitalLabels);
        document.getElementById('selectorModo').addEventListener('change', function(e) {
            modoActual = e.target.value;
            renderMapa();
        });

        Promise.all([cargarMundoUnaSolaVez(), cargarInfoPaisesUnaSolaVez()]).then(() => {
            renderMapa();
        });
    </script>
</body>
</html>
